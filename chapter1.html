<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞机比火车快 – บทที่ 1</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/chapter.css">
</head>
<body>

  <!-- Background -->
  <div class="bg-container"></div>
  <div class="moon"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="cloud c4"></div>

  <!-- Rail + Train -->
  <div class="rail-track">
    <div class="rail-ties"></div>
    <div class="rail-left"></div>
    <div class="rail-right"></div>
    <div class="rail-ground"></div>
  </div>


  <!-- Fixed UI -->
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="achievement" id="achievement"><span class="emoji">🎉</span><div id="achievementText">เก่งมาก!</div></div>
  <div class="counter-display" id="vocabCounter"><span class="emoji">⭐</span><span class="count" id="counter">0/11</span></div>
  <div class="quiz-score" id="quizScoreDisplay"><span class="emoji">🏆</span><span class="count" id="quizScoreText">0/11</span></div>
  <div class="section-label vocab" id="sectionLabel">🚆 บทที่ 1</div>
  <a class="home-btn" href="index.html" title="หน้าหลัก">🏠</a>
  <div class="speed-control" id="speedControl"></div>

  <!-- Swiper -->
  <div class="swiper">
    <div class="swiper-wrapper" id="slides"></div>
    <div class="swiper-pagination"></div>
    <div class="nav-btn nav-prev" id="prevBtn">‹</div>
    <div class="nav-btn nav-next" id="nextBtn">›</div>
  </div>

  <!-- Scripts: data first, then engine -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="assets/js/data/ch1.js"></script>
  <script src="assets/js/chapter.js"></script>
</body>
</html>
